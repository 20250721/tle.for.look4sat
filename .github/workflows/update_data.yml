name: Auto Update Orbital Data

on:
  schedule:
    - cron: '0 */2 * * *' # UTC每2小时执行
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 克隆仓库（包含 data/ 历史目录、download.py、历史 log.md）

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Download Script
        run: |
          # 格式化生成 log.md
          echo "# Auto Update Log" > log.md
          echo "" >> log.md
          echo "**Last Execution:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> log.md
          echo "" >> log.md
          echo '```text' >> log.md
          
          # 执行脚本，合并标准输出和错误输出，显示在控制台的同时追加写入 log.md
          python download.py 2>&1 | tee -a log.md
          
          echo '```' >> log.md

      - name: Push to Branch
        run: |
          # 仅在 data/ 目录下的文件有变更时，才提交数据和 log.md
          if [ -n "$(git status --porcelain data/)" ]; then
            UPDATE_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
            > commit_msg.txt
            echo "Auto orbital data update | $UPDATE_TIME" >> commit_msg.txt
            echo "" >> commit_msg.txt
            echo "Modified files & size:" >> commit_msg.txt

            git status --porcelain data/ | awk '{print $NF}' | sed 's/"//g' | while read -r file; do
              if [ -f "$file" ]; then
                FSIZE=$(du -sh "$file" | awk '{print $1}')
                echo " - $file | $FSIZE" >> commit_msg.txt
              fi
            done

            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # 同时将 data/ 的更新以及新的 log.md 暂存并推送到仓库
            git add data/ log.md
            git commit -F commit_msg.txt
            git push origin HEAD
            rm -f commit_msg.txt
          else
            echo "No data file changed, skip commit & push."
          fi
