name: Auto Update Orbital Data

on:
  schedule:
    - cron: '0 */2 * * *' # UTC每2小时执行
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Download Script
        run: |
          # 格式化生成 log.md
          echo "# Auto Update Log" > log.md
          echo "" >> log.md
          echo "**Last Execution:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> log.md
          echo "" >> log.md
          echo '```text' >> log.md
          
          # 执行脚本，合并标准输出和错误输出，显示在控制台的同时追加写入 log.md
          python download.py 2>&1 | tee -a log.md
          
          echo '```' >> log.md

      - name: Push to Branch
        run: |
          # 检测是否有任何文件（包括 log.md）发生变更
          if [ -n "$(git status --porcelain)" ]; then
            UPDATE_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
            > commit_msg.txt
            
            # 检测 data/ 目录是否有数据文件更新
            DATA_CHANGES=$(git status --porcelain data/)
            
            if [ -n "$DATA_CHANGES" ]; then
              # 有数据更新时的提交信息
              echo "Auto orbital data update | $UPDATE_TIME" >> commit_msg.txt
              echo "" >> commit_msg.txt
              echo "Modified files & size:" >> commit_msg.txt
              
              echo "$DATA_CHANGES" | awk '{print $NF}' | sed 's/"//g' | while read -r file; do
                if [ -f "$file" ]; then
                  FSIZE=$(du -sh "$file" | awk '{print $1}')
                  echo " - $file | $FSIZE" >> commit_msg.txt
                fi
              done
            else
              # 仅更新日志（数据未变动或被限速）时的提交信息
              echo "Auto orbital data check (log updated) | $UPDATE_TIME" >> commit_msg.txt
              echo "" >> commit_msg.txt
              echo "No data files were updated in this run (up-to-date or Celestrak rate-limited)." >> commit_msg.txt
            fi

            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # 将变更（包括 data/ 和 log.md）暂存并推送到仓库
            git add data/ log.md
            git commit -F commit_msg.txt
            git push origin HEAD
            rm -f commit_msg.txt
          else
            echo "No changes at all."
          fi
